[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-workforce-framework"
version = "0.2.0"
description = "Python SDK for the Agentic Workforce Framework — an operating model for autonomous agent teams"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = [
  "ai-agents",
  "agentic",
  "operating-model",
  "trust-scoring",
  "failure-memory",
  "multi-agent"
]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules"
]
dependencies = [
  "pydantic>=2.5",
]

[project.urls]
Homepage = "https://github.com/rayyagari2-create/agentic-workforce-framework"
Repository = "https://github.com/rayyagari2-create/agentic-workforce-framework"
Documentation = "https://github.com/rayyagari2-create/agentic-workforce-framework"

[tool.hatch.build.targets.wheel]
packages = ["src/awf"]